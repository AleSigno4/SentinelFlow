server:
  port: 8081

spring:
  application:
    name: sentinelflow
  
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

ai:
  service:
    url: ${AI_SERVICE_URL}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000