<div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
  <div class="w-full max-w-sm">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-blue-600 mb-2">🛡️ SentinelFlow</h1>
      <p class="text-gray-600 text-sm">Automated Fraud Detection System</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-xl shadow-lg border border-gray-200 p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Login</h2>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded">
        <p class="text-red-700 text-sm font-medium">⚠️ {{ errorMessage }}</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="onLogin()" class="space-y-5">
        <!-- Username -->
        <div>
          <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">
            Username
          </label>
          <input
            type="text"
            id="username"
            placeholder="Insert username"
            [(ngModel)]="username"
            name="username"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            required
          />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
            Password
          </label>
          <input
            type="password"
            id="password"
            placeholder="Insert password"
            [(ngModel)]="password"
            name="password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            required
          />
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 disabled:from-gray-400 disabled:to-gray-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 disabled:hover:scale-100 mt-6"
        >
          <span *ngIf="!isLoading" class="flex items-center justify-center">
            🔓 Login
          </span>
          <span *ngIf="isLoading" class="flex items-center justify-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Logging in...
          </span>
        </button>
      </form>
    </div>

    <!-- Bottom Info -->
    <p class="text-center text-gray-600 text-sm mt-6">
      🔐 Secure authentication with JWT tokens
    </p>
  </div>
</div>
