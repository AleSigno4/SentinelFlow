services:
  postgres-db:
    image: postgres:18.3
    container_name: sentinel_db_container
    environment:
      POSTGRES_DB: sentinel_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: sentinel_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"  # Accederai da http://localhost:5050
    depends_on:
      - db
      
volumes:
  postgres_data: