version: '3.9'

services:
  # Spring Boot backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinelflow-backend
    ports:
      - "8081:8081"
    env_file: .env
    volumes:
      - backend-data:/app/data
    networks:
      - sentinelflow-network
    depends_on:
      - ml-service

  # FastAPI ML service
  ml-service:
    build:
      context: ./backend/ai-model
      dockerfile: Dockerfile
    container_name: sentinelflow-ml
    ports:
      - "8000:8000"
    networks:
      - sentinelflow-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinelflow-frontend
    ports:
      - "4200:4200"
    networks:
      - sentinelflow-network
    depends_on:
      - backend

volumes:
  backend-data:

networks:
  sentinelflow-network:
    driver: bridge